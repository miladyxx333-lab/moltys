name = "lobpoop-core"
main = "src/index.ts"
compatibility_date = "2026-01-30"
compatibility_flags = ["nodejs_compat"]

# 1. Almacenamiento Persistente (R2)
# El 'Poop-Ledger' y la memoria de los agentes viven aquí.
[[r2_buckets]]
binding = "MEMORY_BUCKET"
bucket_name = "lobpoop-sovereign-memory"

# 2. Objetos Durables (Integridad Atómica)
# Garantizan que las transacciones financieras y de clanes sean seguras.
[durable_objects]
bindings = [
  { name = "ACCOUNT_DO", class_name = "AccountDurableObject" },
  { name = "CLAN_DO", class_name = "ClanDurableObject" },
  { name = "GAME_MASTER_DO", class_name = "GameMasterDurableObject" },
  { name = "AGENCY_DO", class_name = "AgencyDurableObject" },
  { name = "COLISEUM_DO", class_name = "ColiseumDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AccountDurableObject", "ClanDurableObject", "GameMasterDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AgencyDurableObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ColiseumDurableObject"]

# 3. Entorno de Ejecución (Standard Worker Environment)
# [[unsafe.bindings]] (Sandbox no soportado en plan standard)
# name = "LOB_SANDBOX"
# type = "sandbox"

# 4. Navegación Autónoma
[browser]
binding = "BROWSER"

# 5. Inteligencia Artificial (Workers AI)
[ai]
binding = "AI"

# 6. Variables de Entorno y Secretos
[vars]
PROJECT_NAME = "lobpoop"
STRICT_MODE = "true"
LOGIC_PATH_VALIDATION = "sovereign_solution"
ANTHROPIC_BASE_URL = "https://gateway.ai.cloudflare.com/v1/ACCOUNT_TAG/lobpoop-gateway/anthropic"

# --- 🗝️ TUS LLAVES PERSONALES (Descomenta y pega tus keys aquí) ---
# OPENAI_API_KEY = "sk-..."
# ANTHROPIC_API_KEY = "sk-ant-..."
# GROK_API_KEY = "xai-..."
GEMINI_API_KEY = "AIzaSyArsGJgoCS00mAFtibxGNOXjDyMKDyhBfQ" # (Default Pública)

# 7. Cron Triggers (Hourly Maintenance & Molty Signals)
[triggers]
crons = [
    "0 * * * *"    # Horario (Molty Signals + Maintenance)
]
